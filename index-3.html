        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        .cta-btn {
          background: #FF4D00;
          color: #fff;
          border: none;
          cursor: pointer;
          font-family: 'Space Grotesk', sans-serif;
          font-weight: 700;
          font-size: 1.1rem;
          padding: 18px 40px;
          border-radius: 12px;
          letter-spacing: 0.01em;
          transition: all 0.2s;
          width: 100%;
          max-width: 420px;
          display: block;
          text-align: center;
        }
        .cta-btn:hover { background: #e04400; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,77,0,0.35); }
        .cta-btn:active { transform: translateY(0); }

        .glow-line {
          height: 1px;
          background: linear-gradient(90deg, transparent, #FF4D00, transparent);
          margin: 0 auto;
          max-width: 600px;
        }

        .lift-card { transition: transform 0.25s ease, border-color 0.25s ease; }
        .lift-card:hover { transform: translateY(-4px); border-color: rgba(255,77,0,0.4); }

        .sticky-cta { display: none; }

        @keyframes glowPulse {
          0%, 100% { box-shadow: 0 0 0px rgba(255,77,0,0.0); }
          50% { box-shadow: 0 -4px 24px rgba(255,77,0,0.45); }
        }

        @media (max-width: 768px) {
          .sticky-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #FF4D00;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 16px;
            z-index: 999;
            cursor: pointer;
            animation: glowPulse 2.5s ease-in-out infinite;
          }
        }

        .trust-grid {
          display: grid;
          grid-template-columns: 1.1fr 0.9fr;
          gap: 36px;
          align-items: start;
        }
        @media (max-width: 768px) {
          .trust-grid { grid-template-columns: 1fr; }
          .trust-grid .trust-image { order: -1; }
        }

        .course-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 18px;
        }
        @media (max-width: 600px) {
          .course-grid { grid-template-columns: 1fr; }
        }

        .testimonial-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 18px;
        }
        @media (max-width: 600px) {
          .testimonial-grid { grid-template-columns: 1fr; }
        }

          * { animation: none !important; transition: none !important; }
        }
